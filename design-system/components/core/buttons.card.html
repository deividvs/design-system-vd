<style>
  body { margin:0; font-family:var(--font-body); padding:28px; background:var(--cream); }
  .stack { display:flex; flex-direction:column; gap:18px; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, Tag, Card, IconBadge } = window.VictorDaridoDesignSystem_c7f0ee;
    const arrow = <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;

    function Demo() {
      return (
        <div className="stack">
